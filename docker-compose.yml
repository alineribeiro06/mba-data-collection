version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: pipeline_transacoes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # 👇 DEFINE OS DOIS LISTENERS
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      
      # 👇 DEFINE COMO CADA UM É USADO
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  jupyter:
    image: jupyter/base-notebook
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: "123"
    volumes:
      - ./notebooks:/home/mba/work

  api:
    build: .
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: always

  simulador:
    build: .
    container_name: simulador
    depends_on:
      kafka:
        condition: service_started
    command: python simulator/simulador.py
    restart: always

  consumer:
    build: .
    container_name: consumer
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    command: python consumer/consumer.py
    restart: always

  # 🔥 SERVIÇO NOVO (executa os SQL sempre)
  init-db:
    image: postgres:15
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/init:/scripts
    entrypoint: >
      bash -c "
      echo '🚀 Rodando scripts...' &&
      psql -h postgres -U postgres -d pipeline_transacoes -f /scripts/01_schema.sql &&
      psql -h postgres -U postgres -d pipeline_transacoes -f /scripts/02_bronze.sql &&
      psql -h postgres -U postgres -d pipeline_transacoes -f /scripts/03_silver.sql &&
      psql -h postgres -U postgres -d pipeline_transacoes -f /scripts/04_gold.sql &&
      echo '✅ Scripts executados!'
      "
    environment:
      PGPASSWORD: 1234
volumes:
  postgres_data: